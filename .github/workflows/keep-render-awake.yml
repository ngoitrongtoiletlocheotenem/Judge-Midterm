name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_BACKEND_URL: ${{ vars.RENDER_BACKEND_URL || 'https://online-judge-backend-mrca.onrender.com' }}
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          echo "Pinging: ${RENDER_BACKEND_URL}/api/admin/import"
          curl -fSsL --retry 3 --retry-delay 5 --max-time 25 "${RENDER_BACKEND_URL}/api/admin/import" > /dev/null

      - name: Warm key endpoint
        run: |
          set -e
          echo "Warming: ${RENDER_BACKEND_URL}/api/problems"
          curl -fSsL --retry 3 --retry-delay 5 --max-time 25 "${RENDER_BACKEND_URL}/api/problems" > /dev/null

      - name: Done
        run: echo "Render backend ping completed"
